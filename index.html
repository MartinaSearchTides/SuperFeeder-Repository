<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="googlebot" content="noindex, nofollow">
<title>SearchTides - Superfeeder Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #f5f4f0;
  --surface:  #ffffff;
  --surface2: #f9f8f5;
  --surface3: #eeecea;
  --border:   rgba(0,0,0,0.08);
  --border2:  rgba(0,0,0,0.14);
  --text:     #1a1916;
  --muted:    #888580;
  --muted2:   #5a5754;
  --purple:       #5b4de0;
  --purple-dim:   rgba(91,77,224,0.08);
  --purple-bdr:   rgba(91,77,224,0.22);
  --teal:       #0e9e80;
  --teal-bdr:   rgba(14,158,128,0.22);
  --teal-dim:   rgba(14,158,128,0.08);
  --teal-bdr:   rgba(14,158,128,0.22);
  --amber:      #c47a1a;
  --sf-accent:  #0f766e;
  --sf-accent-dim: rgba(15,118,110,0.12);
  --red:    #c0392b;
  --orange: #e07820;
  --green:  #1a8a52;
  --fd: 'Libre Baskerville', serif;
  --fs: 'Inter', sans-serif;
  --fm: 'DM Mono', monospace;
}
body { font-family: var(--fs); background: var(--bg); color: var(--text); min-height: 100vh; font-variant-numeric: tabular-nums; font-size: 14px; }

#loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 1.5rem; }
.load-wordmark { font-family: var(--fd); font-size: 12px; font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; gap: 12px; }
.load-wordmark::before, .load-wordmark::after { content: ''; display: block; width: 32px; height: 1px; background: var(--border2); }
.load-title { font-family: var(--fd); font-size: 48px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; text-align: center; line-height: 1.1; }
.load-title .sf-name { font-style: italic; color: var(--sf-accent); font-weight: 400; }
.load-status { font-size: 12px; color: var(--muted); font-family: var(--fm); display: flex; align-items: center; gap: 8px; }
.spinner { width: 14px; height: 14px; border: 2px solid var(--border2); border-top-color: var(--sf-accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-box { background: var(--surface); border: 1px solid rgba(192,57,43,0.3); border-radius: 8px; padding: 1.5rem 2rem; max-width: 480px; text-align: center; }
.error-box h3 { font-family: var(--fd); font-size: 18px; color: var(--red); margin-bottom: 0.5rem; }
.error-box p { font-size: 13px; color: var(--muted2); font-family: var(--fm); margin-bottom: 1rem; word-break: break-word; }
.retry-btn { padding: 8px 20px; background: var(--sf-accent); color: #fff; border: none; border-radius: 4px; font-size: 12px; font-weight: 600; font-family: var(--fs); cursor: pointer; letter-spacing: 0.06em; text-transform: uppercase; }

#dashboard { display: none; max-width: 1600px; margin: 0 auto; padding: 0 2rem 4rem; }
.topnav { display: flex; align-items: center; justify-content: space-between; padding: 1.1rem 0; border-bottom: 1px solid var(--border2); flex-wrap: wrap; gap: 1rem; }
.nav-brand { font-family: var(--fd); font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.nav-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--sf-accent); }
.nav-brand .sf-name { color: var(--sf-accent); font-style: italic; font-weight: 600; }
.nav-brand span.sub { color: var(--muted); font-weight: 400; font-size: 14px; font-family: var(--fs); }
.nav-right { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
.nav-meta { font-size: 11px; color: var(--muted); font-family: var(--fm); max-width: 420px; text-align: right; }
.refresh-btn { font-size: 11px; color: var(--muted2); background: var(--surface); border: 1px solid var(--border2); border-radius: 4px; padding: 6px 14px; cursor: pointer; font-family: var(--fm); display: flex; align-items: center; gap: 6px; transition: border-color 0.15s, color 0.15s; }
.refresh-btn:hover { border-color: var(--teal-bdr); color: var(--sf-accent); }
.refresh-btn .spin-sm { width: 10px; height: 10px; border: 1.5px solid var(--border2); border-top-color: var(--sf-accent); border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
.refresh-btn.loading .spin-sm { display: block; }

.tabs { display: flex; border-bottom: 1px solid var(--border2); margin-bottom: 1.75rem; }
.tab { padding: 13px 22px; font-size: 11px; font-weight: 600; letter-spacing: 0.09em; text-transform: uppercase; font-family: var(--fm); color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.15s, border-color 0.15s; }
.tab:hover { color: var(--muted2); }
.tab.active { color: var(--purple); border-bottom-color: var(--purple); }
.tab-content { display: none; }
.tab-content.active { display: block; }

.panel-title { font-family: var(--fd); font-size: 15px; font-weight: 700; margin-bottom: 0.75rem; color: var(--text); }
.panel-hint { font-size: 12px; color: var(--muted); font-family: var(--fm); margin-bottom: 1rem; }

.table-wrap { overflow-x: auto; border: 1px solid var(--border2); border-radius: 8px; margin-bottom: 2rem; background: var(--surface); }
.year-table { width: 100%; border-collapse: collapse; font-size: 12px; font-family: var(--fm); }
.year-table th, .year-table td { padding: 10px 12px; text-align: right; border-bottom: 1px solid var(--border); white-space: nowrap; }
.year-table th:first-child, .year-table td:first-child { text-align: left; position: sticky; left: 0; background: var(--surface); z-index: 1; box-shadow: 4px 0 8px -4px rgba(0,0,0,0.08); }
.year-table thead th { font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); background: var(--surface2); }
.year-table tbody tr:hover td { background: var(--surface2); }
.year-table tbody tr:hover td:first-child { background: var(--surface2); }
.num-zero { color: var(--muted); }

.link-grid-title { font-family: var(--fd); font-size: 15px; font-weight: 700; margin: 2rem 0 0.75rem; }
.link-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
.link-card { background: var(--surface); border: 1px solid var(--border2); border-radius: 8px; padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; transition: background 0.15s, border-color 0.15s; }
.link-card:hover { background: var(--surface2); border-color: var(--teal-bdr); }
.link-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.tag { font-size: 9px; font-family: var(--fm); text-transform: uppercase; letter-spacing: 0.06em; padding: 3px 8px; border-radius: 3px; background: var(--surface3); border: 1px solid var(--border2); color: var(--muted2); }
.tag-client { color: var(--teal); border-color: var(--teal-bdr); background: var(--teal-dim); }
.link-card a.url { font-size: 12px; font-family: var(--fm); color: var(--purple); word-break: break-all; text-decoration: none; line-height: 1.35; }
.link-card a.url:hover { text-decoration: underline; }
.link-domain { font-size: 11px; color: var(--muted); font-family: var(--fm); }

.clients-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; }
.sf-card { background: var(--surface); border: 1px solid var(--border2); border-radius: 8px; overflow: hidden; border-top: 3px solid var(--sf-accent); }
.sf-card:hover { background: var(--surface2); }
.sf-card-head { padding: 16px 18px 12px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap; }
.sf-client { font-family: var(--fd); font-size: 20px; font-weight: 700; }
.budget-strip { padding: 12px 18px; background: var(--surface2); border-bottom: 1px solid var(--border); font-family: var(--fm); font-size: 12px; display: grid; gap: 6px; }
.budget-row { display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.budget-label { color: var(--muted); text-transform: uppercase; font-size: 10px; letter-spacing: 0.08em; }
.budget-val { font-weight: 600; }
.rem-neg { color: var(--red); }
.rem-ok { color: var(--green); }

.sf-section { padding: 14px 18px; border-bottom: 1px solid var(--border); }
.sf-section:last-child { border-bottom: none; }
.sf-sec-title { font-size: 9px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; font-family: var(--fm); color: var(--amber); margin-bottom: 10px; }
.sf-sec-title.prof { color: var(--teal); }
.sf-sec-title.insert { color: var(--purple); }
.sf-sec-title.guest { color: var(--amber); }
.sf-metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.sf-metrics.two { grid-template-columns: repeat(2, 1fr); }
.sf-metric { background: var(--surface2); border-radius: 6px; padding: 8px 10px; text-align: center; }
.sf-metric .lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; font-family: var(--fm); margin-bottom: 4px; }
.sf-metric .val { font-family: var(--fd); font-size: 22px; font-weight: 700; }

.empty-state { padding: 2rem; text-align: center; color: var(--muted); font-family: var(--fm); font-size: 13px; border: 1px dashed var(--border2); border-radius: 8px; }

@media (max-width: 900px) {
  .sf-metrics { grid-template-columns: 1fr; }
  .sf-metrics.two { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="load-wordmark">SearchTides</div>
  <h1 class="load-title"><span class="sf-name">Superfeeder</span><br>DASHBOARD</h1>
  <div class="load-status" id="load-status">
    <div class="spinner"></div>
    <span id="load-text">Loading data...</span>
  </div>
</div>

<div id="dashboard">
  <div class="topnav">
    <div class="nav-brand">
      <div class="nav-dot"></div>
      <span class="sf-name">Superfeeder</span>
      <span class="sub">/ DASHBOARD</span>
    </div>
    <div class="nav-right">
      <span class="nav-meta" id="nav-meta"></span>
      <button type="button" class="refresh-btn" id="refresh-btn" onclick="loadData()">
        <div class="spin-sm"></div>
        Refresh
      </button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" data-tab="year" onclick="switchTab('year')">2026 overview</div>
    <div class="tab" data-tab="month" onclick="switchTab('month')">This month</div>
  </div>
  <div class="tab-content active" id="tab-year">
    <p class="panel-hint">Published article counts per client by month (2026). Below: link cards for each published row.</p>
    <div id="year-table-host"></div>
    <div class="link-grid-title">Published links</div>
    <div class="link-grid" id="link-grid"></div>
  </div>
  <div class="tab-content" id="tab-month">
    <p class="panel-hint" id="month-hint"></p>
    <div class="clients-grid" id="month-grid"></div>
  </div>
</div>

<script>
var globalPayload = null;

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function fmtInt(v) {
  var n = parseInt(v, 10);
  if (isNaN(n)) n = 0;
  return n.toLocaleString("en-US");
}
function fmtMoney(v) {
  var n = parseFloat(v);
  if (isNaN(n)) n = 0;
  return n.toLocaleString("en-US", { minimumFractionDigits: 0, maximumFractionDigits: 2 });
}
function safeUrl(href) {
  var s = String(href || "").trim();
  if (!s) return "";
  if (/^https?:\/\//i.test(s)) return s;
  return "https://" + s;
}
function displayHost(url) {
  try {
    var u = new URL(url);
    return u.hostname.replace(/^www\./, "");
  } catch (e) {
    return "";
  }
}

function switchTab(tab) {
  document.querySelectorAll(".tab").forEach(function (t) {
    t.classList.toggle("active", t.getAttribute("data-tab") === tab);
  });
  document.getElementById("tab-year").classList.toggle("active", tab === "year");
  document.getElementById("tab-month").classList.toggle("active", tab === "month");
}

function renderYearTable(payload) {
  var host = document.getElementById("year-table-host");
  var months = payload.months || [];
  var matrix = payload.yearMatrix || [];
  if (!matrix.length) {
    host.innerHTML = '<div class="empty-state">No 2026 rows matched filters in SeaTable.</div>';
    return;
  }
  var html = '<div class="table-wrap"><table class="year-table"><thead><tr><th>Client</th>';
  for (var i = 0; i < months.length; i++) {
    html += "<th>" + esc(months[i]) + "</th>";
  }
  html += "</tr></thead><tbody>";
  for (var r = 0; r < matrix.length; r++) {
    var row = matrix[r];
    html += "<tr><td><strong>" + esc(row.client) + "</strong></td>";
    var bm = row.byMonth || {};
    for (var j = 0; j < months.length; j++) {
      var c = bm[months[j]] || 0;
      html += '<td class="' + (c ? "" : "num-zero") + '">' + fmtInt(c) + "</td>";
    }
    html += "</tr>";
  }
  html += "</tbody></table></div>";
  host.innerHTML = html;
}

function renderLinkGrid(payload) {
  var grid = document.getElementById("link-grid");
  var tiles = payload.publishedTiles || [];
  if (!tiles.length) {
    grid.innerHTML = '<div class="empty-state">No published tiles for 2026.</div>';
    return;
  }
  var html = "";
  for (var i = 0; i < tiles.length; i++) {
    var t = tiles[i];
    var url = safeUrl(t.live_link);
    var host = displayHost(url);
    html += '<div class="link-card">';
    html += '<div class="link-tags">';
    html += '<span class="tag">' + esc(t.prod_month || "") + "</span>";
    html += '<span class="tag tag-client">' + esc(t.client || "") + "</span>";
    if (t.type_of_post) html += '<span class="tag">' + esc(t.type_of_post) + "</span>";
    html += "</div>";
    if (url) {
      html += '<a class="url" href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">' + esc(url) + "</a>";
      if (host) html += '<div class="link-domain">' + esc(host) + "</div>";
    } else {
      html += '<div class="link-domain">No LIVE LINK on row</div>';
    }
    html += "</div>";
  }
  grid.innerHTML = html;
}

function renderMonth(payload) {
  document.getElementById("month-hint").textContent =
    "Prod Month " + (payload.current_prod_month || "") + " - counts by Type of Post. Content Requested only applies to Guest Post.";

  var grid = document.getElementById("month-grid");
  var list = payload.currentMonth || [];
  if (!list.length) {
    grid.innerHTML = '<div class="empty-state">No rows for this month (and no budget configured for this month in SUPERFEEDER_MONTHLY_BUDGET_JSON).</div>';
    return;
  }
  var html = "";
  for (var i = 0; i < list.length; i++) {
    var c = list[i];
    var sec = c.sections || {};
    var prof = sec.profound || { published: 0, pending: 0, content_requested: 0 };
    var ins = sec.linkInsert || { published: 0, pending: 0, content_requested: 0 };
    var guest = sec.guestPost || { published: 0, pending: 0, content_requested: 0 };

    var bud = c.budget;
    var spend = c.spend;
    var rem = c.remaining;
    var remClass = rem == null ? "" : rem < 0 ? "rem-neg" : "rem-ok";

    html += '<div class="sf-card">';
    html += '<div class="sf-card-head"><div class="sf-client">' + esc(c.client) + "</div></div>";

    html += '<div class="budget-strip">';
    html += '<div class="budget-row"><span class="budget-label">Monthly budget</span><span class="budget-val">' +
      (bud == null ? "Not set" : "$" + fmtMoney(bud)) + "</span></div>";
    html += '<div class="budget-row"><span class="budget-label">Spend (FINAL $)</span><span class="budget-val">$' + fmtMoney(spend) + "</span></div>";
    html += '<div class="budget-row"><span class="budget-label">Remaining</span><span class="budget-val ' + remClass + '">' +
      (rem == null ? "N/A" : "$" + fmtMoney(rem)) + "</span></div>";
    html += "</div>";

    html += sectionBlock("Profound Placement", "prof", prof, false);
    html += sectionBlock("Link Insert", "insert", ins, false);
    html += sectionBlock("Guest Post", "guest", guest, true);

    html += "</div>";
  }
  grid.innerHTML = html;
}

function sectionBlock(title, cls, data, showCR) {
  var html = '<div class="sf-section">';
  html += '<div class="sf-sec-title ' + cls + '">' + esc(title) + "</div>";
  html += '<div class="sf-metrics' + (showCR ? "" : " two") + '">';
  html += metricCell("Published", data.published);
  html += metricCell("Pending", data.pending);
  if (showCR) html += metricCell("Content req.", data.content_requested);
  html += "</div></div>";
  return html;
}

function metricCell(lbl, val) {
  return '<div class="sf-metric"><div class="lbl">' + esc(lbl) + '</div><div class="val">' + fmtInt(val) + "</div></div>";
}

async function loadData() {
  var btn = document.getElementById("refresh-btn");
  var loadScreen = document.getElementById("loading-screen");
  var dash = document.getElementById("dashboard");

  btn.classList.add("loading");
  document.getElementById("load-text").textContent = "Loading data...";

  try {
    var res = await fetch("/api/data");
    if (!res.ok) throw new Error("API error " + res.status);
    var json = await res.json();
    if (!json.ok) throw new Error(json.error || "Unknown error");

    globalPayload = json;
    var loaded = new Date(json.generated).toLocaleTimeString("en-US");
    var tiles = (json.publishedTiles && json.publishedTiles.length) || 0;
    document.getElementById("nav-meta").textContent =
      json.year + " data - " + (json.current_prod_month || "") + " - " + tiles + " published tiles - loaded " + loaded;

    renderYearTable(json);
    renderLinkGrid(json);
    renderMonth(json);

    loadScreen.style.display = "none";
    dash.style.display = "block";
  } catch (err) {
    document.getElementById("load-text").textContent = "Error: " + err.message;
    loadScreen.innerHTML =
      '<div class="load-wordmark">SearchTides</div>' +
      '<h1 class="load-title"><span class="sf-name">Superfeeder</span><br>DASHBOARD</h1>' +
      '<div class="error-box">' +
      '<h3>Could not load data</h3>' +
      '<p>' + esc(err.message) + "</p>" +
      '<button type="button" class="retry-btn" onclick="location.reload()">Retry</button>' +
      "</div>";
  } finally {
    btn.classList.remove("loading");
  }
}

loadData();
</script>
</body>
</html>
